name: Android APK CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # This fixes the "Node.js 20 is deprecated" warning you saw
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Updated pnpm version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Moving to Node 24 to stay ahead of the curve

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Deep Clean Replit & Workspace Junk
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const clean = (obj) => {
              if (!obj) return;
              Object.keys(obj).forEach(k => {
                const val = obj[k];
                if (k.includes('@replit') || (typeof val === 'string' && (val.includes('catalog:') || val.includes('workspace:')))) {
                  delete obj[k];
                }
              });
            };
            clean(pkg.dependencies);
            clean(pkg.devDependencies);
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
        working-directory: artifacts/uno-buddy

      - name: Install Game Dependencies & Build Tools
        # We explicitly add vite and typescript back in case they were in the catalog
        run: |
          pnpm install --no-frozen-lockfile --ignore-workspace
          pnpm add -D vite typescript @vitejs/plugin-react
        working-directory: artifacts/uno-buddy

      - name: Build Web Assets
        run: pnpm run build
        working-directory: artifacts/uno-buddy

      - name: Setup Android Shell
        run: |
          pnpm add @capacitor/android @capacitor/core @capacitor/cli
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
        working-directory: artifacts/uno-buddy

      - name: Build Android APK
        working-directory: artifacts/uno-buddy/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uno-buddy-app
          path: artifacts/uno-buddy/android/app/build/outputs/apk/debug/app-debug.apk
          
