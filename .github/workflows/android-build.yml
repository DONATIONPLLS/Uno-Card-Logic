name: Android APK CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Game Dependencies
        # We tell pnpm to ignore the workspace and the broken catalog
        run: |
          pnpm install --no-frozen-lockfile --ignore-workspace
        working-directory: artifacts/uno-buddy

      - name: Build Web Assets
        run: pnpm run build
        working-directory: artifacts/uno-buddy

      - name: Setup Android Shell
        run: |
          pnpm add @capacitor/android @capacitor/core @capacitor/cli
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
        working-directory: artifacts/uno-buddy

      - name: Build Android APK
        working-directory: artifacts/uno-buddy/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uno-buddy-app
          path: artifacts/uno-buddy/android/app/build/outputs/apk/debug/app-debug.apk
          
