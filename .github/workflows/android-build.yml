name: Android APK CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install

      - name: Build web assets
        run: pnpm run build

      - name: Ensure @capacitor/android is installed
        run: |
          if ! pnpm ls @capacitor/android --depth=0 >/dev/null 2>&1; then
            pnpm add @capacitor/android
          fi

      - name: Ensure android/ platform is added
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync web assets to Android platform
        run: npx cap sync android

      - name: Build Android APK (assembleDebug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uno-buddy-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
