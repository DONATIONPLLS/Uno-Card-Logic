name: Android APK CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Clean package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const clean = (obj) => {
              if (!obj) return;
              Object.keys(obj).forEach(k => {
                const val = obj[k];
                if (k.includes('@replit') || (typeof val === 'string' && (val.includes('catalog:') || val.includes('workspace:')))) {
                  delete obj[k];
                }
              });
            };
            clean(pkg.dependencies);
            clean(pkg.devDependencies);
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
        working-directory: artifacts/uno-buddy

      - name: Create Clean Vite Config
        run: |
          cat <<EOF > vite.config.ts
          import { defineConfig } from 'vite';
          import react from '@vitejs/plugin-react';
          import tailwindcss from '@tailwindcss/vite';

          export default defineConfig({
            plugins: [react(), tailwindcss()],
            build: {
              outDir: 'dist',
            }
          });
          EOF
        working-directory: artifacts/uno-buddy

      - name: Install All Required Libraries
        run: |
          pnpm install --no-frozen-lockfile --ignore-workspace
          pnpm add react react-dom framer-motion lucide-react clsx tailwind-merge
          pnpm add -D vite typescript @vitejs/plugin-react tailwindcss @tailwindcss/vite @types/react @types/react-dom
        working-directory: artifacts/uno-buddy

      - name: Build Web Assets
        run: pnpm run build
        working-directory: artifacts/uno-buddy

      - name: Setup Android Shell
        run: |
          pnpm add @capacitor/android @capacitor/core @capacitor/cli
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
        working-directory: artifacts/uno-buddy

      - name: Apply Custom System Bars (Black Top, Clear Bottom)
        run: |
          FILE=$(find android/app/src/main/java -name MainActivity.java | head -n1)
          
          # 1. Add necessary imports
          sed -i '/package /a import android.graphics.Color;\nimport android.view.View;\nimport android.view.WindowManager;' "$FILE"
          
          # 2. Inject the split logic: Black status bar, Transparent nav bar
          # Notice we removed View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN so it doesn't overlap the top!
          sed -i '/super.onCreate/a \        getWindow().addFlags(WindowManager.LayoutParams.FLAG_DRAWS_SYSTEM_BAR_BACKGROUNDS);\n        getWindow().setStatusBarColor(Color.BLACK);\n        getWindow().setNavigationBarColor(Color.TRANSPARENT);\n        getWindow().getDecorView().setSystemUiVisibility(View.SYSTEM_UI_FLAG_LAYOUT_STABLE | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION);' "$FILE"
        working-directory: artifacts/uno-buddy
        
        
      - name: Build Android APK
        working-directory: artifacts/uno-buddy/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uno-buddy-app
          path: artifacts/uno-buddy/android/app/build/outputs/apk/debug/app-debug.apk
          
