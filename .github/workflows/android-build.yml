name: Android APK CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Ensure @capacitor/android is installed
        run: |
          if ! npm ls @capacitor/android --depth=0 >/dev/null 2>&1; then
            npm install @capacitor/android
          fi

      - name: Ensure android/ platform is added
        run: |
          if [ ! -d "android" ]; then
            npx cap add android --npm-client npm
          fi

      - name: Sync web assets to Android platform
        run: npx cap sync android

      - name: Build Android APK (assembleDebug)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
